<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稟議ワークフロー デモ（AppSheet風・保存なし）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
    background: #e8eaed;
    color: #202124;
    min-height: 100vh;
  }
  .page { max-width: 1080px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ===== デモ操作バー ===== */
  .demo-bar {
    background: #202124; color: #fff; border-radius: 12px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .demo-bar .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .demo-bar .note { font-size: 12px; color: #bdc1c6; margin-bottom: 10px; }
  .persona-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 8px;
    background: #3c4043; border: 2px solid transparent; color: #fff;
    border-radius: 24px; padding: 6px 14px 6px 6px; cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .chip:hover { background: #5f6368; }
  .chip.active { background: #1a73e8; border-color: #8ab4f8; }
  .chip .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .chip small { color: #dadce0; font-size: 11px; }

  .layout { display: flex; gap: 24px; align-items: flex-start; justify-content: center; }

  /* ===== スマホ枠 ===== */
  .phone {
    width: 390px; flex-shrink: 0;
    background: #111; border-radius: 36px; padding: 10px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
  }
  .screen {
    background: #f8f9fa; border-radius: 28px; overflow: hidden;
    height: 720px; display: flex; flex-direction: column; position: relative;
  }
  .statusbar {
    background: #1a73e8; color: #fff; font-size: 11px;
    padding: 6px 18px 0; display: flex; justify-content: space-between;
  }
  .appbar {
    background: #1a73e8; color: #fff; padding: 10px 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .appbar .appname { font-size: 17px; font-weight: 600; }
  .appbar .me {
    display: flex; align-items: center; gap: 8px; font-size: 12px;
  }
  .appbar .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; border: 2px solid rgba(255,255,255,.7);
  }
  .content { flex: 1; overflow-y: auto; padding: 14px 14px 90px; }

  .section-label {
    font-size: 12px; color: #5f6368; font-weight: 600;
    margin: 4px 4px 8px; letter-spacing: .3px;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 12px 14px;
    box-shadow: 0 1px 3px rgba(60,64,67,.15); margin-bottom: 10px;
    cursor: pointer; transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 3px 10px rgba(60,64,67,.25); }
  .card .row1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card .subject { font-size: 14px; font-weight: 600; }
  .card .amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .card .row2 { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .card .meta { font-size: 11px; color: #5f6368; }
  .pill {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; white-space: nowrap;
  }
  .empty {
    text-align: center; color: #5f6368; font-size: 13px; padding: 48px 20px; line-height: 1.8;
  }
  .empty .big { font-size: 40px; }

  /* ===== 下部ナビ ===== */
  .bottomnav {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid #e0e0e0;
    display: flex; padding: 6px 0 10px;
  }
  .navitem {
    flex: 1; text-align: center; cursor: pointer; color: #5f6368;
    font-size: 11px; padding: 4px 0;
  }
  .navitem .ico { font-size: 20px; display: block; margin-bottom: 2px; }
  .navitem.active { color: #1a73e8; font-weight: 600; }
  .navitem .badge {
    background: #d93025; color: #fff; font-size: 10px; border-radius: 10px;
    padding: 0 5px; margin-left: 2px;
  }

  .fab {
    position: absolute; right: 18px; bottom: 76px;
    width: 54px; height: 54px; border-radius: 50%;
    background: #1a73e8; color: #fff; font-size: 28px; border: none; cursor: pointer;
    box-shadow: 0 4px 12px rgba(26,115,232,.5);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { background: #1765cc; }

  /* ===== 詳細・フォームのオーバーレイ ===== */
  .overlay {
    position: absolute; inset: 0; background: #f8f9fa; z-index: 5;
    display: flex; flex-direction: column;
  }
  .overlay .obar {
    background: #1a73e8; color: #fff; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 600;
  }
  .overlay .back { cursor: pointer; font-size: 20px; }
  .overlay .obody { flex: 1; overflow-y: auto; padding: 16px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: #5f6368; font-weight: 600; margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #dadce0; border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #fff;
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field input:focus, .field textarea:focus { outline: 2px solid #1a73e8; border-color: transparent; }

  .kv { background: #fff; border-radius: 12px; padding: 4px 14px; box-shadow: 0 1px 3px rgba(60,64,67,.15); }
  .kv .item { display: flex; padding: 10px 0; border-bottom: 1px solid #f1f3f4; font-size: 13px; }
  .kv .item:last-child { border-bottom: none; }
  .kv .k { width: 90px; color: #5f6368; flex-shrink: 0; }
  .kv .v { font-weight: 500; }

  .timeline { margin-top: 16px; }
  .timeline .tl-item { display: flex; gap: 10px; padding: 6px 4px; font-size: 12px; }
  .timeline .dot { color: #1a73e8; }
  .timeline .t { color: #5f6368; width: 96px; flex-shrink: 0; }

  .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn.approve { background: #1a73e8; color: #fff; }
  .btn.reject { background: #fce8e6; color: #c5221f; }
  .btn.sendback { background: #f1f3f4; color: #3c4043; }
  .btn.submit { background: #1a73e8; color: #fff; }
  .btn:hover { filter: brightness(.95); }
  .hint {
    background: #e8f0fe; color: #174ea6; font-size: 12px; border-radius: 8px;
    padding: 10px 12px; margin-top: 16px; line-height: 1.6;
  }

  /* ===== トースト（擬似メール通知） ===== */
  .toast-wrap {
    position: absolute; bottom: 140px; left: 0; right: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
  }
  .toast {
    background: #202124; color: #fff; font-size: 12px; border-radius: 20px;
    padding: 9px 16px; max-width: 320px; box-shadow: 0 4px 12px rgba(0,0,0,.3);
    animation: toastin .25s ease;
  }
  @keyframes toastin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ===== 右側パネル ===== */
  .panel { flex: 1; min-width: 280px; max-width: 480px; }
  .pcard {
    background: #fff; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(60,64,67,.15); font-size: 13px; line-height: 1.8;
  }
  .pcard h3 { font-size: 14px; margin-bottom: 8px; }
  .pcard ol { padding-left: 20px; }
  .pcard li { margin-bottom: 4px; }
  .pcard table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: 6px; }
  .pcard th, .pcard td { border: 1px solid #e0e0e0; padding: 6px 8px; text-align: left; }
  .pcard th { background: #f8f9fa; color: #5f6368; font-weight: 600; }
  .pcard .tag {
    display: inline-block; background: #e8f0fe; color: #174ea6;
    font-size: 11px; font-weight: 600; border-radius: 4px; padding: 1px 6px;
  }

  @media (max-width: 860px) {
    .layout { flex-direction: column; align-items: center; }
    .panel { max-width: 390px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="demo-bar">
    <div class="title">操作する人を切り替える（本番ではGoogleログインが自動でやる部分）</div>
    <div class="note">データは保存されません。リロードで最初に戻ります。</div>
    <div class="persona-chips" id="chips"></div>
  </div>

  <div class="layout">
    <div class="phone">
      <div class="screen" id="screen">
        <div class="statusbar"><span id="clock">9:41</span><span>📶 🔋</span></div>
        <div class="appbar">
          <span class="appname">📋 稟議申請</span>
          <span class="me" id="me"></span>
        </div>
        <div class="content" id="content"></div>
        <button class="fab" id="fab" onclick="openForm()">＋</button>
        <div class="bottomnav" id="nav"></div>
        <div class="toast-wrap" id="toasts"></div>
        <div id="overlay-slot"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ================= 名簿（ユーザー管理・権限管理の正体） =================
const USERS = [
  { id: 'suzuki',  name: '鈴木',  role: '一般', color: '#0f9d58', email: 'suzuki@example.com' },
  { id: 'takahashi', name: '高橋', role: '一般', color: '#f29900', email: 'takahashi@example.com' },
  { id: 'tanaka',  name: '田中',  role: '課長', color: '#1a73e8', email: 'tanaka@example.com', limit: 50000 },
  { id: 'sato',    name: '佐藤',  role: '部長', color: '#a142f4', email: 'sato@example.com' },
];
const KACHO_LIMIT = 50000;

// ================= 申請データ（メモリ上のみ・保存なし） =================
let seq = 6;
let requests = [
  { id: 1, owner: 'suzuki', subject: 'ノートPC購入', amount: 128000, purpose: '営業用PCの入替。現行機が起動に5分かかるため。',
    status: '一次承認待ち', log: [['7/18 10:02', '鈴木が申請']] },
  { id: 2, owner: 'takahashi', subject: '顧客接待費', amount: 18000, purpose: '株式会社サンプル様との会食（4名）。',
    status: '一次承認待ち', log: [['7/19 15:40', '高橋が申請']] },
  { id: 3, owner: 'suzuki', subject: '展示会出展費', amount: 300000, purpose: '9月の業界展示会 小間代・装飾費。',
    status: '二次承認待ち', log: [['7/15 09:12', '鈴木が申請'], ['7/16 11:30', '田中課長が一次承認（5万円超のため部長へ）']] },
  { id: 4, owner: 'takahashi', subject: '書籍購入', amount: 4500, purpose: 'マーケティング関連書籍2冊。',
    status: '承認済み', log: [['7/14 13:00', '高橋が申請'], ['7/14 16:20', '田中課長が承認（5万円以下のため完結）']] },
  { id: 5, owner: 'suzuki', subject: 'タクシー利用', amount: 9800, purpose: '終電後の帰宅（イベント撤収対応）。',
    status: '差し戻し', log: [['7/13 22:10', '鈴木が申請'], ['7/14 09:05', '田中課長が差し戻し（利用日を用途に明記してほしい）']] },
];

let currentUserId = 'suzuki';
let currentTab = 'home';

const me = () => USERS.find(u => u.id === currentUserId);
const isApprover = u => u.role === '課長' || u.role === '部長';
const yen = n => Number(n).toLocaleString('ja-JP') + '円';
const now = () => {
  const d = new Date();
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
};

const STATUS_STYLE = {
  '一次承認待ち': 'background:#fff3e0;color:#b26a00',
  '二次承認待ち': 'background:#f3e5f5;color:#7b1fa2',
  '承認済み':     'background:#e6f4ea;color:#1b7f4d',
  '却下':         'background:#fce8e6;color:#c5221f',
  '差し戻し':     'background:#e8f0fe;color:#174ea6',
};

// 今のユーザーが承認操作できる申請か
function actionable(r) {
  if (r.status === '一次承認待ち' && me().role === '課長') return true;
  if (r.status === '二次承認待ち' && me().role === '部長') return true;
  return false;
}
const myPendingCount = () => requests.filter(actionable).length;

// ================= 描画 =================
function render() {
  // 上部：ユーザー切替チップ
  document.getElementById('chips').innerHTML = USERS.map(u => `
    <div class="chip ${u.id === currentUserId ? 'active' : ''}" onclick="switchUser('${u.id}')">
      <span class="avatar" style="background:${u.color}">${u.name[0]}</span>
      <span>${u.name}<br><small>${u.role}${u.limit ? '・上限' + yen(u.limit) : ''}</small></span>
    </div>`).join('');

  // アプリバー：ログイン中ユーザー
  const u = me();
  document.getElementById('me').innerHTML =
    `<span>${u.name}（${u.role}）</span><span class="avatar" style="background:${u.color}">${u.name[0]}</span>`;

  // 下部ナビ（一般ユーザーには「承認」タブ自体を出さない＝権限管理）
  const tabs = [
    { id: 'home', ico: '🏠', label: 'ホーム' },
    ...(isApprover(u) ? [{ id: 'approve', ico: '✅', label: '承認', badge: myPendingCount() }] : []),
    { id: 'roster', ico: '👥', label: '名簿' },
  ];
  if (!tabs.some(t => t.id === currentTab)) currentTab = 'home';
  document.getElementById('nav').innerHTML = tabs.map(t => `
    <div class="navitem ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">
      <span class="ico">${t.ico}</span>${t.label}${t.badge ? `<span class="badge">${t.badge}</span>` : ''}
    </div>`).join('');

  document.getElementById('fab').style.display = currentTab === 'home' ? 'flex' : 'none';

  const c = document.getElementById('content');
  if (currentTab === 'home') c.innerHTML = renderHome();
  else if (currentTab === 'approve') c.innerHTML = renderApprove();
  else c.innerHTML = renderRoster();
}

function cardHtml(r, showOwner) {
  const owner = USERS.find(u => u.id === r.owner);
  return `
    <div class="card" onclick="openDetail(${r.id})">
      <div class="row1">
        <span class="subject">${r.subject}</span>
        <span class="amount">${yen(r.amount)}</span>
      </div>
      <div class="row2">
        <span class="meta">${showOwner ? '申請者：' + owner.name + '　' : ''}${r.log[0][0]}</span>
        <span class="pill" style="${STATUS_STYLE[r.status]}">${r.status}</span>
      </div>
    </div>`;
}

function renderHome() {
  const mine = requests.filter(r => r.owner === currentUserId).sort((a,b) => b.id - a.id);
  if (mine.length === 0) return `<div class="section-label">自分の申請</div>
    <div class="empty"><div class="big">📭</div>まだ申請がありません。<br>右下の「＋」から申請してみてください。</div>`;
  return `<div class="section-label">自分の申請</div>` + mine.map(r => cardHtml(r, false)).join('');
}

function renderApprove() {
  const mine = requests.filter(actionable);
  const others = requests.filter(r => !actionable(r)).sort((a, b) => b.id - a.id);
  let html = `<div class="section-label">あなたの承認待ち（${mine.length}件）</div>`;
  html += mine.length
    ? mine.map(r => cardHtml(r, true)).join('')
    : `<div class="empty" style="padding:18px 20px"><div class="big">☕</div>いま承認待ちの案件はありません。</div>`;
  if (others.length) {
    html += `<div class="section-label" style="margin-top:18px">そのほかの案件（進行中・対応済み）</div>`;
    html += others.map(r => cardHtml(r, true)).join('');
  }
  return html;
}

function renderRoster() {
  return `<div class="section-label">名簿（＝ユーザー管理・権限管理の正体）</div>
    <div class="kv">${USERS.map(u => `
      <div class="item">
        <span class="k" style="display:flex;align-items:center;gap:8px">
          <span class="avatar" style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;background:${u.color}">${u.name[0]}</span>${u.name}
        </span>
        <span class="v">${u.role}${u.limit ? '（承認上限 ' + yen(u.limit) + '）' : u.role === '部長' ? '（上限なし）' : ''}<br>
        <small style="color:#5f6368;font-weight:400">${u.email}</small></span>
      </div>`).join('')}
    </div>
    <div class="hint">この表がスプレッドシートの「名簿シート」。本物のAppSheetでは、ここに1行足せばユーザー追加、役職を書き換えれば権限変更が完了します。</div>`;
}

// ================= 詳細画面 =================
function openDetail(id) {
  const r = requests.find(x => x.id === id);
  const owner = USERS.find(u => u.id === r.owner);
  let buttons = '';
  if (actionable(r)) {
    buttons = `<div class="actions">
      <button class="btn approve" onclick="approve(${r.id})">承認する</button>
      <button class="btn sendback" onclick="sendBack(${r.id})">差し戻す</button>
      <button class="btn reject" onclick="reject(${r.id})">却下する</button>
    </div>`;
  } else if (r.owner === currentUserId && r.status === '差し戻し') {
    buttons = `<div class="actions">
      <button class="btn submit" onclick="openForm(${r.id})">修正して再申請する</button>
    </div>`;
  }
  let routeHint = '';
  if (r.status === '一次承認待ち') {
    routeHint = r.amount > KACHO_LIMIT
      ? `<div class="hint">💡 ${yen(r.amount)} は課長の承認上限（${yen(KACHO_LIMIT)}）を超えているため、課長承認のあと自動で部長に回ります。</div>`
      : `<div class="hint">💡 ${yen(r.amount)} は課長の承認上限（${yen(KACHO_LIMIT)}）以下なので、課長の承認だけで完結します。</div>`;
  }
  showOverlay(`申請の詳細`, `
    <div class="kv">
      <div class="item"><span class="k">件名</span><span class="v">${r.subject}</span></div>
      <div class="item"><span class="k">金額</span><span class="v">${yen(r.amount)}</span></div>
      <div class="item"><span class="k">申請者</span><span class="v">${owner.name}（${owner.role}）</span></div>
      <div class="item"><span class="k">用途</span><span class="v">${r.purpose}</span></div>
      <div class="item"><span class="k">ステータス</span><span class="v"><span class="pill" style="${STATUS_STYLE[r.status]}">${r.status}</span></span></div>
    </div>
    <div class="timeline">
      <div class="section-label">これまでの流れ</div>
      ${r.log.map(l => `<div class="tl-item"><span class="dot">●</span><span class="t">${l[0]}</span><span>${l[1]}</span></div>`).join('')}
    </div>
    ${routeHint}${buttons}`);
}

// ================= 新規・再申請フォーム =================
function openForm(editId) {
  const r = editId ? requests.find(x => x.id === editId) : null;
  showOverlay(r ? '修正して再申請' : '新規申請', `
    <div class="field"><label>件名</label><input id="f-subject" value="${r ? r.subject : ''}" placeholder="例：ノートPC購入"></div>
    <div class="field"><label>金額（円）</label><input id="f-amount" type="number" value="${r ? r.amount : ''}" placeholder="例：60000"></div>
    <div class="field"><label>用途</label><textarea id="f-purpose" placeholder="何のための費用か">${r ? r.purpose : ''}</textarea></div>
    <div class="hint">💡 5万円以下→課長のみ／5万円超→課長＋部長の二段階になります（自動判定）。</div>
    <div class="actions"><button class="btn submit" onclick="submitForm(${editId || 'null'})">申請する</button></div>`);
}

function submitForm(editId) {
  const subject = document.getElementById('f-subject').value.trim();
  const amount = Number(document.getElementById('f-amount').value);
  const purpose = document.getElementById('f-purpose').value.trim();
  if (!subject || !amount || amount <= 0) { toast('⚠️ 件名と金額を入れてください'); return; }

  if (editId) {
    const r = requests.find(x => x.id === editId);
    Object.assign(r, { subject, amount, purpose, status: '一次承認待ち' });
    r.log.push([now(), me().name + 'が修正して再申請']);
  } else {
    requests.push({ id: seq++, owner: currentUserId, subject, amount, purpose: purpose || '（記載なし）',
      status: '一次承認待ち', log: [[now(), me().name + 'が申請']] });
  }
  closeOverlay();
  toast('📧 田中課長に承認依頼メールが飛びました（擬似）');
  render();
}

// ================= 承認・却下・差し戻し =================
function approve(id) {
  const r = requests.find(x => x.id === id);
  if (r.status === '一次承認待ち') {
    if (r.amount > KACHO_LIMIT) {
      r.status = '二次承認待ち';
      r.log.push([now(), '田中課長が一次承認（5万円超のため部長へ）']);
      toast('📧 佐藤部長に二次承認依頼メールが飛びました（擬似）');
    } else {
      r.status = '承認済み';
      r.log.push([now(), '田中課長が承認（5万円以下のため完結）']);
      toast('📧 申請者に「承認されました」メールが飛びました（擬似）');
    }
  } else if (r.status === '二次承認待ち') {
    r.status = '承認済み';
    r.log.push([now(), '佐藤部長が二次承認']);
    toast('📧 申請者に「承認されました」メールが飛びました（擬似）');
  }
  closeOverlay(); render();
}

function reject(id) {
  const r = requests.find(x => x.id === id);
  r.status = '却下';
  r.log.push([now(), me().name + me().role + 'が却下']);
  toast('📧 申請者に「却下されました」メールが飛びました（擬似）');
  closeOverlay(); render();
}

function sendBack(id) {
  const r = requests.find(x => x.id === id);
  r.status = '差し戻し';
  r.log.push([now(), me().name + me().role + 'が差し戻し']);
  toast('📧 申請者に「修正してください」メールが飛びました（擬似）');
  closeOverlay(); render();
}

// ================= 部品 =================
function showOverlay(title, bodyHtml) {
  document.getElementById('overlay-slot').innerHTML = `
    <div class="overlay">
      <div class="obar"><span class="back" onclick="closeOverlay()">←</span>${title}</div>
      <div class="obody">${bodyHtml}</div>
    </div>`;
}
function closeOverlay() { document.getElementById('overlay-slot').innerHTML = ''; }

function switchUser(id) {
  currentUserId = id;
  closeOverlay();
  const u = me();
  toast('👤 ' + u.name + '（' + u.role + '）としてログインしました');
  render();
}
function switchTab(id) { currentTab = id; closeOverlay(); render(); }

function toast(msg) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

document.getElementById('clock').textContent =
  String(new Date().getHours()).padStart(2,'0') + ':' + String(new Date().getMinutes()).padStart(2,'0');
render();
</script>
